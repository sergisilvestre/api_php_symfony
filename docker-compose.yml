name: api-php-symfony

services:
  # -----------------------------
  # DATABASE (MySQL)
  # -----------------------------
  db:
    image: mysql:8.3
    container_name: api-php-symfony-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -----------------------------
  # API (SYMFONY)
  # -----------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-php-symfony-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
    working_dir: /var/www
    depends_on:
      db:
        condition: service_healthy

  # -----------------------------
  # PROXY (NGINX)
  # -----------------------------
  proxy:
    image: nginx:alpine
    container_name: api-php-symfony-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - app

  # -----------------------------
  # WORKER QUEUE (SYMFONY MESSENGER)
  # -----------------------------
  # queue:
  #   build: .
  #   container_name: api-php-symfony-queue
  #   command: php bin/console messenger:consume async -vv --time-limit=3600
  #   restart: unless-stopped
  #   networks:
  #     - app
  #   volumes:
  #     - .:/var/www
  #     - vendor:/var/www/vendor
  #   working_dir: /var/www
  #   depends_on:
  #     db:
  #       condition: service_healthy

  # -----------------------------
  # SCHEDULER (SAFE LOOP - REPLACE WITH CRON IF NEEDED)
  # -----------------------------
  scheduler:
    build: .
    container_name: api-php-symfony-scheduler
    command: >
      sh -c "while true; do
        echo 'Scheduler running... (replace with real cron or scheduler bundle)';
        sleep 60;
      done"
    restart: unless-stopped
    networks:
      - app
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
    working_dir: /var/www
    depends_on:
      db:
        condition: service_healthy

  # -----------------------------
  # REDIS (CACHE / QUEUE / SESSION)
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: api-php-symfony-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app

  # -----------------------------
  # MAILPIT (SMTP TESTING)
  # -----------------------------
  smtp:
    image: axllent/mailpit
    container_name: api-php-symfony-smtp
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app

# -----------------------------
# NETWORKS
# -----------------------------
networks:
  app:

# -----------------------------
# VOLUMES
# -----------------------------
volumes:
  dbdata:
  vendor:
  grafana_data:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
