security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

    providers:
        app_user_provider:
            entity:
                class: 'App\User\Infrastructure\Doctrine\Entity\UserRecord'
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/v1/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/check, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1/auth/revoke, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1/auth/refresh, roles: IS_AUTHENTICATED_FULLY }