nelmio_cors:
    defaults:
        allow_origin:
            - 'http://localhost:3000'
            - 'http://127.0.0.1:3000'
        allow_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
        allow_headers:
            - Content-Type
            - Authorization
            - X-Requested-With
        expose_headers:
            - Link
        max_age: 3600

    paths:
        '^/api/':
            allow_origin:
                - 'http://localhost:3000'
                - 'http://127.0.0.1:3000'
            allow_headers:
                - Content-Type
                - Authorization
                - X-Requested-With
            allow_methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS